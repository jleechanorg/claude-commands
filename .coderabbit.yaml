# CodeRabbit configuration for claude-commands template repository
# auto_approve: when CR finds 0 actionable items, it posts a formal APPROVED review.
# This is intentional for this export-driven template repo where PRs are generated
# by automated export scripts. Downstream consumers should adjust for their own PRs.
language: en-US
reviews:
  auto_review:
    enabled: true
  auto_approve: true
  request_changes_workflow: false
  review_profile: chill
chat:
  auto_reply: true
