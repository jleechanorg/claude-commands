# AgentLoop Configuration
# 
# This file configures orchestrator settings, integrations, and providers.
# Agent definitions are in .agentloop/agents/*.md files.
#
# Uncomment and modify sections as needed.

# Project initialization status
project:
  initialized: false
  existing: false

# ============================================================
# MODEL CONFIGURATION
# ============================================================
# Set the default model used by the daemon on startup.
# Supports provider/model format (e.g., "openai/gpt-5.3-codex") or
# short aliases (e.g., "sonnet", "opus", "haiku").
# Can be overridden by the AGENTLOOP_MODEL environment variable.
# models:
#   defaultModel: "openai/gpt-5.3-codex"

# ============================================================
# ANTHROPIC API CONFIGURATION
# ============================================================
# anthropic:
#   api_key: "sk-ant-..."  # Your Anthropic API key
#   base_url: "https://api.anthropic.com"  # Optional: custom API endpoint

# ============================================================
# GITHUB INTEGRATION
# ============================================================
# github:
#   enabled: true
#   token: "ghp_..."  # GitHub personal access token

# ============================================================
# ORCHESTRATOR SETTINGS
# ============================================================
orchestrator:
  max_parallel_agents: 1  # Maximum agents running in parallel
  worktrees_dir: ".worktrees"  # Directory for worktrees
  sync_agents: none  # Options: all, none, or list specific agents

# Additional orchestrator options (uncomment to customize):
#   cleanup_worktrees_on_complete: true  # Auto-cleanup after completion
#
  # Container sandbox configuration (requires Podman or Docker)
  container_sandbox:
    enabled: false  # Set to true to enable container-based agent isolation
#     runtime: "auto"  # "auto", "podman", or "docker"
#     container_image: "agentloop-worker"
#     network_mode: "slirp4netns"  # "none", "slirp4netns", or "host"
#     memory_limit: "4g"
#     cpu_limit: "2"

# ============================================================
# JIRA INTEGRATION
# ============================================================
# jira:
#   siteUrl: "https://your-org.atlassian.net"
#   project: "PROJ"  # Default project key
#   # OAuth authentication (recommended)
#   clientId: "..."
#   clientSecret: "..."
#   # OR Basic authentication
#   email: "you@example.com"
#   apiToken: "..."

# ============================================================
# MOCK CONFIGURATION (for testing)
# ============================================================
# mock:
#   enabled: false
#   mode: "selective"  # "all-mock", "all-real", or "selective"
#   real_agents: []  # Agents to run with real API calls
#   mock_agents: []  # Agents to mock
#   verbose: false

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
# Shared logs are written to .agentloop/logs/ (per-project).
# Per-agent logs are written to .agentloop/agents/{type}/ alongside agent configs.
# Set any entry to false to disable that log category.
logging:
  agentloop: true        # Structured app log (agentloop.log)
  worker: true           # Worker process logs (worker.log)
  bt_debug: false        # Behavior-tree debug (bt-debug.log) — very noisy, enable only when debugging
  mcp: true              # MCP protocol logs (mcp.log)
  debug: true            # Debug category logs (debug.log)
  audit: true            # Audit trail (audit.log + audit.integrity)
  daemon: true           # Global daemon log (~/.config/agentloop/logs/daemon.log)
  daemon_local: true     # Local copy of daemon log (.agentloop/logs/daemon.log)
  agent_execution: true  # Per-execution logs (agents/execution-*.jsonl)
  chat: true             # Chat conversation logs (chat.log)
  provider: true         # Provider routing and API verification logs (provider.log)
  llm: true              # LLM execution logs — tools, steps, tokens (llm.log)

# ============================================================
# STRIPE INTEGRATION
# ============================================================
# stripe:
#   secret_key: "sk_test_..."  # Stripe secret API key
