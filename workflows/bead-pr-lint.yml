name: bead-pr-lint

# Lint: every PR body MUST contain a `Beads:` line.
# - Format: `Beads: REV-xxxx` or comma-separated list of REV-/rev- IDs (>=4 alnum chars).
# - `Beads: none` is an explicit opt-out.
# - The line just needs to contain at least one valid bead ID; trailing prose is OK.
#
# This is the worldai half of the bead-PR bridge (the dark-factory half is the
# auto-factory daemon spec 3.1 normalizer). Beads live in `.beads/issues.jsonl`
# (REV-* prefix) but were previously invisible in PRs.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-beads-line:
    name: "PR body has Beads line"
    runs-on: ubuntu-latest
    steps:
      - name: "Validate Beads line in PR body"
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BODY="${PR_BODY:-}"

          # Extract the Beads: line (case-insensitive, leading whitespace tolerated)
          BEADS_LINE="$(printf "%s\n" "$BODY" | grep -iE "^[[:space:]]*Beads:[[:space:]]*" || true)"

          if [ -z "$BEADS_LINE" ]; then
            echo "::error title=Missing Beads line::PR body is missing the required Beads: line."
            echo "::error::Add one of:"
            echo "::error::  - Beads: REV-xxxx (or comma-separated list) when this PR closes/fixes/refs a bead"
            echo "::error::  - Beads: none if no bead applies (explicit opt-out)"
            exit 1
          fi

          # Accept `Beads: none` as an explicit opt-out
          if printf "%s" "$BEADS_LINE" | grep -iqE "^[[:space:]]*Beads:[[:space:]]*none[[:space:]]*$"; then
            echo "Beads: none (explicit opt-out accepted)."
            exit 0
          fi

          # Otherwise require at least one REV-/rev- ID (>=4 alnum chars) on the line.
          # Trailing prose after the IDs is allowed (e.g. "Beads: REV-w98fd (closes fix)").
          if ! printf "%s" "$BEADS_LINE" | grep -iqE "rev-[a-z0-9]{4,}"; then
            echo "::error title=Malformed Beads line::Beads line exists but does not contain a valid bead ID."
            echo "::error::Expected at least one REV-xxxx (or rev-xxxx) reference (4+ alnum chars)."
            echo "::error::Got: $BEADS_LINE"
            exit 1
          fi

          echo "Beads line valid: $BEADS_LINE"
