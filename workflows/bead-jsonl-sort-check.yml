name: bead-jsonl-sort

# Catches wholesale JSONL re-sorts in PR diffs (worldai noise pattern).
# A change that touches .beads/issues.jsonl must keep the file sorted by
# id ascending; otherwise a single-bead change becomes a +1686/-1685 rewrite.
#
# Background: worldai PR #7848 (2026-06-23) showed +1683/-1682 noise on an
# unrelated PR because the JSONL was re-sorted by a different br version.
#
# Triggers on EVERY PR + push to main so we always have a guardrail. The
# check itself is cheap (single read of .beads/issues.jsonl + sort verify)
# so the cost of running on every PR is negligible.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-sort:
    name: .beads/issues.jsonl sorted by id
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.13"

      - name: Check JSONL sort order
        run: python3 scripts/check_bead_jsonl_sort.py
