name: Runner Quarantine Reset

on:
  workflow_dispatch:
    inputs:
      runner_pattern:
        description: "Runner name prefix to reset (e.g. org-runner)"
        required: false
        default: "all"
      reason:
        description: "Reason for reset"
        required: false
        default: "manual-quarantine-reset"

jobs:
  reset-quarantine:
    runs-on: ${{ (inputs.runner_pattern != 'all' && !contains(inputs.runner_pattern, '*')) && fromJson(format('["{0}"]', inputs.runner_pattern)) || fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    timeout-minutes: 5
    steps:
      - name: Reset runner quarantine score
        run: |
          STATE_FILE="${HOME}/.cache/${PROJECT_NAME:-your-project}-ci/runner-health-score.json"
          RUNNER="${RUNNER_NAME:-unknown}"
          PATTERN="${{ inputs.runner_pattern }}"
          REASON="${{ inputs.reason }}"

          if [ "$PATTERN" != "all" ] && [[ "$RUNNER" != "$PATTERN"* ]]; then
            echo "Skipping $RUNNER (does not match pattern '$PATTERN')"
            exit 0
          fi

          if [ ! -f "$STATE_FILE" ]; then
            echo "No quarantine state file on $RUNNER — already clean"
            exit 0
          fi

          BEFORE=$(python3 -c "import json; print(json.load(open('$STATE_FILE')).get('runners',{}).get('$RUNNER',{}).get('score','?'))" 2>/dev/null || echo "?")

          export STATE_FILE RUNNER REASON
          python3 - <<'PYEOF'
          import json, sys, os, tempfile
          from datetime import datetime, timezone

          path = os.environ.get('STATE_FILE', '')
          runner = os.environ.get('RUNNER', '')
          reason = os.environ.get('REASON', 'unknown')

          try:
              with open(path) as f:
                  data = json.load(f)
          except FileNotFoundError:
              print('No state file found, skipping reset')
              sys.exit(0)
          except (json.JSONDecodeError, PermissionError, OSError) as e:
              print(f'Error reading state file {path}: {e}')
              sys.exit(1)

          runners = data.get('runners', {})
          if runner in runners:
              old = runners[runner].get('score', 0)
              runners[runner]['score'] = 0
              runners[runner]['quarantined'] = False
              runners[runner]['updated_at'] = datetime.now(timezone.utc).isoformat()
              events = runners[runner].setdefault('events', [])
              events.append({'timestamp': datetime.now(timezone.utc).isoformat(), 'delta': -old, 'reason': reason, 'score': 0, 'quarantined': False})
              if len(events) > 50:
                  runners[runner]['events'] = events[-50:]

          parent = os.path.dirname(path) or '.'
          os.makedirs(parent, exist_ok=True)
          with tempfile.NamedTemporaryFile(mode='w', dir=parent, suffix='.tmp', delete=False) as tf:
              json.dump(data, tf, indent=2, sort_keys=True)
              tmp = tf.name
          os.replace(tmp, path)
          print(f'Reset {runner}: score {old} -> 0')
          PYEOF

          AFTER=$(python3 -c "import json; print(json.load(open('$STATE_FILE')).get('runners',{}).get('$RUNNER',{}).get('score','?'))" 2>/dev/null || echo "?")

          echo "::notice::Runner $RUNNER quarantine reset: score $BEFORE -> $AFTER (reason: $REASON)"
