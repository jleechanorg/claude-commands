name: Install-script unit tests

# Runs the EPHEMERAL guard regex tests in self-hosted-oss/linux/test-install-guards.sh
# whenever the install scripts change. No sudo / no Docker / no host modification.

on:
  pull_request:
    paths:
      - 'self-hosted-oss/linux/install.sh'
      - 'self-hosted-oss/linux/boot-start.sh'
      - 'self-hosted-oss/linux/install-linux-host-limits.sh'
      - 'self-hosted-oss/linux/test-install-guards.sh'
      - '.github/workflows/test-install-guards.yml'

permissions:
  contents: read

concurrency:
  group: install-guards-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest # APPROVED_EXCEPTION
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: bash -n syntax checks
        run: |
          bash -n self-hosted-oss/linux/install.sh
          bash -n self-hosted-oss/linux/boot-start.sh
          bash -n self-hosted-oss/linux/install-linux-host-limits.sh
          bash -n self-hosted-oss/linux/test-install-guards.sh
          echo "✅ All install scripts parse cleanly"

      - name: EPHEMERAL guard regex tests
        run: bash self-hosted-oss/linux/test-install-guards.sh
