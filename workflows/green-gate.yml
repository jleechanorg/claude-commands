name: Green Gate

# Trigger-only + polling workflow. No LLM evaluation runs in GHA.
# Flow: pre-check 7-green eligibility (gates 1-6) → check smoke gate (gate 8) →
# post trigger comment → lifecycle-manager runs ao skeptic verify via AO worker →
# posts VERDICT comment → GHA polling step detects it and exits PASS/FAIL.
#
# Gate 1-6 pre-check fails closed for non-7-green PRs.
# Gate 8 (Smoke Gate) checks mcp-smoke-tests passing for the PR head SHA;
# required when mvp_site/prompts/ or mvp_site/*.py changed, auto-passes otherwise.
on:
  pull_request:
    types: [opened, synchronize, edited, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head commit SHA"
        required: true
        type: string

# Do NOT cancel in-progress runs — killing a polling step mid-loop discards its
# loop state. A new concurrent run with the same SHA is harmless since the jq
# timestamp filter rejects stale verdicts from cancelled runs.
concurrency:
  group: green-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  green_gate:
    name: Green Gate
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    # Must exceed the poll step timeout so the job is not killed mid-loop.
    timeout-minutes: 60
    permissions:
      pull-requests: write
      issues: write
      contents: read
      statuses: read
      checks: read
    outputs:
      trigger_updated: ${{ steps.post_trigger.outputs.trigger_updated }}
      trigger_sha: ${{ steps.post_trigger.outputs.trigger_sha }}
      eligible: ${{ steps.check_6green.outputs.eligible }}
      head_sha: ${{ steps.check_6green.outputs.head_sha }}
    steps:
      # ----------------------------------------------------------------
      # Pre-check: 7-green eligibility (gates 1-6).
      # Exits fast for non-eligible PRs — avoids expensive CLI setup.
      # ----------------------------------------------------------------
      - name: Check 7-green eligibility (gates 1-6)
        id: check_6green
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        run: |
          PR_NUM=$PR_NUM
          ELIGIBLE=true

          # Gate 1: CI green — only "success" passes
          HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha' 2>/dev/null || echo "")
          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: could not fetch PR head SHA" >&2
            ELIGIBLE=false
          else
            CI_STATUS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
              --jq '.state' 2>/dev/null || echo "error")
            if [ "$CI_STATUS" != "success" ]; then
              echo "GATE-1 FAIL: CI=$CI_STATUS"
              ELIGIBLE=false
            else
              echo "GATE-1 PASS: CI=success"
            fi
            # Export head_sha so subsequent steps reuse the freshly-fetched value
            # instead of the caller-supplied workflow_dispatch input (which may be stale).
            echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi

          # Gate 2: No merge conflicts
          PR_META=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
            --jq '{mergeable: .mergeable, merged: .merged}' 2>/dev/null)
          MERGEABLE=$(echo "$PR_META" | jq -r '.mergeable // "unknown"')
          if [ "$MERGEABLE" != "true" ]; then
            echo "GATE-2 FAIL: mergeable=$MERGEABLE"
            ELIGIBLE=false
          else
            echo "GATE-2 PASS: no conflicts"
          fi

          # Gate 3: CR APPROVED. Prefer formal CodeRabbit review state. Only
          # fall back to the current-head status plus explicit "[approve]" bot
          # comment when there is no formal CodeRabbit review object yet, or
          # when the latest formal review was explicitly dismissed as stale.
          set +e -o pipefail
          LATEST_CR_PIPELINE=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
            --paginate 2>/dev/null \
            | jq -rs --arg head "$HEAD_SHA" 'add | [.[] | select((.user.login == "coderabbitai[bot]" or .user.login == "coderabbitai") and .state != "COMMENTED" and .commit_id == $head)] | sort_by(.submitted_at) | if length > 0 then (last | .state // "none") else "none" end' 2>&1)
          LATEST_CR_EXIT=$?
          set -e +o pipefail
          if [ $LATEST_CR_EXIT -ne 0 ]; then
            echo "GATE-3 ERROR: CR review lookup failed (jq exit=$LATEST_CR_EXIT)"
            ELIGIBLE=false
          else
            LATEST_CR="${LATEST_CR_PIPELINE%$'\n'}"
            if [ "$LATEST_CR" = "APPROVED" ]; then
              CR_SIGNAL="APPROVED"
            elif [ "$LATEST_CR" != "none" ]; then
              # DISMISSED and all other non-APPROVED formal reviews require a new APPROVED review
              CR_SIGNAL="FAIL($LATEST_CR)"
            else
              HEAD_COMMITTED_AT=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA" \
                --jq '.commit.committer.date // ""' 2>/dev/null || echo "")
              CR_STATUS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
                --jq '.statuses | map(select(.context == "CodeRabbit")) | sort_by(.updated_at) | last | .state // "none"' \
                2>/dev/null || echo "none")
              CR_APPROVE_COMMENT="none"
              if [ -n "$HEAD_COMMITTED_AT" ]; then
                set +e -o pipefail
                CR_APPROVE_PIPELINE=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
                  --paginate 2>/dev/null \
                  | jq -rs --arg since "$HEAD_COMMITTED_AT" 'add | [.[] | select((.user.login == "coderabbitai[bot]" or .user.login == "coderabbitai") and .created_at >= $since and (.body | test("\\[approve\\]"; "i")))] | sort_by(.created_at) | last | if . then "APPROVED" else "none" end' 2>&1)
                CR_APPROVE_EXIT=$?
                set -e +o pipefail
                if [ "$CR_APPROVE_EXIT" -eq 0 ]; then
                  CR_APPROVE_COMMENT="${CR_APPROVE_PIPELINE%$'\n'}"
                else
                  CR_APPROVE_COMMENT="none"
                fi
              else
                echo "DEBUG: HEAD_COMMITTED_AT empty for no-review fallback, skipping comment scan"
              fi
              if [ "$CR_STATUS" = "success" ] && [ "$CR_APPROVE_COMMENT" = "APPROVED" ]; then
                CR_SIGNAL="APPROVED(status+comment)"
              elif [ "$CR_STATUS" = "success" ]; then
                # CR completed (status=success) but posted no [approve] comment.
                # This happens when request_changes_workflow=true — CR uses review
                # objects instead of comments for approval. Treat status=success as
                # implicit APPROVED.
                CR_SIGNAL="APPROVED(status-only)"
              else
                CR_SIGNAL="FAIL(status=$CR_STATUS comment=$CR_APPROVE_COMMENT)"
              fi
            fi
          fi
          if [[ "$CR_SIGNAL" == APPROVED* ]]; then
            echo "GATE-3 PASS: CR=$CR_SIGNAL"
          else
            echo "GATE-3 FAIL: CR=$CR_SIGNAL"
            ELIGIBLE=false
          fi

          # Gate 4: Bugbot clean — use CI check-run conclusion, not inline comment count.
          # Bugbot is registered after other jobs and often stays in_progress when this
          # workflow first queries; poll so we do not false-fail 7-green eligibility.
          # Inline comment count is unreliable: stale comments from old commits persist and
          # produce false positives. CI check-run conclusion is the authoritative signal.
          # Fail-closed: only pass on success/neutral/skipped. Treat timed_out/cancelled/none
          # the same as failure — Bugbot must have actually completed cleanly to pass.
          BUGBOT_POLL=0
          BUGBOT_POLL_MAX=40
          while [ "$BUGBOT_POLL" -lt "$BUGBOT_POLL_MAX" ]; do
            BUGBOT_RUNS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
              --paginate 2>/dev/null \
              | jq -rs '[.[] | .check_runs[]?] | map(select(.name | test("Cursor Bugbot"; "i")))' \
              2>/dev/null || echo "[]")
            BUGBOT_COUNT=$(echo "$BUGBOT_RUNS" | jq 'length')
            BUGBOT_CONCLUSION=$(echo "$BUGBOT_RUNS" | jq -r 'if length == 0 then "none" else (sort_by(.completed_at // "") | last | .conclusion // "none") end')
            BUGBOT_STATUS=$(echo "$BUGBOT_RUNS" | jq -r 'if length == 0 then "none" else (sort_by(.completed_at // "") | last | .status // "none") end')
            NEED_WAIT=false
            if [ "$BUGBOT_COUNT" -eq 0 ]; then
              # Bugbot often registers after other jobs; a transient empty list must
              # not skip Gate 4 before the check-run exists (Codex review).
              if [ "$BUGBOT_POLL" -lt 6 ]; then
                NEED_WAIT=true
              else
                # No Bugbot check-run after grace polls — treat as skipped
                BUGBOT_CONCLUSION="skipped"; break
              fi
            elif [ "$BUGBOT_STATUS" = "in_progress" ] || [ "$BUGBOT_STATUS" = "queued" ] || [ "$BUGBOT_STATUS" = "pending" ]; then
              NEED_WAIT=true
            fi
            if [ "$NEED_WAIT" != "true" ]; then
              break
            fi
            BUGBOT_POLL=$((BUGBOT_POLL + 1))
            echo "GATE-4 WAIT: Bugbot runs=$BUGBOT_COUNT status=$BUGBOT_STATUS conclusion=$BUGBOT_CONCLUSION (poll $BUGBOT_POLL/$BUGBOT_POLL_MAX)"
            sleep 20
          done
          if [ "$BUGBOT_CONCLUSION" != "skipped" ]; then
          BUGBOT_RUNS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
            --paginate 2>/dev/null \
            | jq -rs '[.[] | .check_runs[]?] | map(select(.name | test("Cursor Bugbot"; "i")))' \
            2>/dev/null || echo "[]")
          BUGBOT_CONCLUSION=$(echo "$BUGBOT_RUNS" | jq -r 'if length == 0 then "none" else (sort_by(.completed_at // "") | last | .conclusion // "none") end')
          BUGBOT_STATUS=$(echo "$BUGBOT_RUNS" | jq -r 'if length == 0 then "none" else (sort_by(.completed_at // "") | last | .status // "none") end')
          fi
          if [ "$BUGBOT_CONCLUSION" = "success" ] || [ "$BUGBOT_CONCLUSION" = "neutral" ] || [ "$BUGBOT_CONCLUSION" = "skipped" ]; then
            echo "GATE-4 PASS: Bugbot=$BUGBOT_CONCLUSION (clean)"
          else
            echo "GATE-4 FAIL: Bugbot=$BUGBOT_CONCLUSION status=$BUGBOT_STATUS"
            ELIGIBLE=false
          fi

          # Gate 5: Inline comments resolved (GraphQL — REST lacks isResolved)
          PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.user.login // empty' 2>/dev/null || true)
          if [ -z "$PR_AUTHOR" ]; then
            echo "GATE-5 FAIL: PR author lookup failed"
            ELIGIBLE=false
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            # Fail closed on GraphQL errors; paginate to handle PRs with >100 review threads.
            # MAX_PAGES=50 guards against stuck cursors (same endCursor with hasNextPage: true).
            UNRESOLVED=0; GQL_ERROR=0; CURSOR=""; MAX_PAGES=50; PAGE_COUNT=0
          while true; do
            PAGE_COUNT=$((PAGE_COUNT + 1))
            if [ "$PAGE_COUNT" -gt "$MAX_PAGES" ]; then GQL_ERROR=1; break; fi
            if [ -z "$CURSOR" ]; then
              GQL_RESULT=$(gh api graphql -f query='
                query($owner: String!, $name: String!, $number: Int!) {
                  repository(owner: $owner, name: $name) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          isResolved
                          comments(first: 50) {
                            pageInfo { hasNextPage }
                            nodes { author { login } body }
                          }
                        }
                      }
                    }
                  }
                }
              ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" 2>/dev/null)
            else
              GQL_RESULT=$(gh api graphql -f query='
                query($owner: String!, $name: String!, $number: Int!, $cursor: String!) {
                  repository(owner: $owner, name: $name) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          isResolved
                          comments(first: 50) {
                            pageInfo { hasNextPage }
                            nodes { author { login } body }
                          }
                        }
                      }
                    }
                  }
                }
              ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" -f cursor="$CURSOR" 2>/dev/null)
            fi
            if [ -z "$GQL_RESULT" ] || ! echo "$GQL_RESULT" | jq -e '
              (.errors | not) and
              (.data.repository.pullRequest.reviewThreads.pageInfo != null)
            ' >/dev/null; then
              GQL_ERROR=1
              break
            fi
            if [ "$(echo "$GQL_RESULT" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
              GQL_ERROR=1
              break
            fi
            PAGE_UNRESOLVED=$(echo "$GQL_RESULT" | jq -r \
              --arg author "$PR_AUTHOR" \
              --arg ignore_cursor "cursor" \
              --arg ignore_cursor_bot "cursor[bot]" \
              --arg ignore_codereview "coderabbitai" \
              --arg ignore_codereview_bot "coderabbitai[bot]" \
              --arg ignore_github_actions "github-actions[bot]" \
              --arg ignore_codex_connector "chatgpt-codex-connector" \
              --arg ignore_codex_connector_bot "chatgpt-codex-connector[bot]" \
              '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) |
                 .comments.nodes[] |
                 select(
                   .author.login != null and
                   (.author.login | ascii_downcase) != ($author | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_cursor | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_cursor_bot | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codereview | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codereview_bot | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_github_actions | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codex_connector | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codex_connector_bot | ascii_downcase) and
                   (.body | test("^\\s*(nit:|nitpick)"; "i") | not)
                 )] | length')
            UNRESOLVED=$((UNRESOLVED + PAGE_UNRESOLVED))
            HAS_NEXT=$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [ "$HAS_NEXT" != "true" ]; then
              break
            fi
            NEXT_CURSOR=$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
            if [ -z "$NEXT_CURSOR" ] || [ "$NEXT_CURSOR" = "null" ] || [ "$NEXT_CURSOR" = "$CURSOR" ]; then
              GQL_ERROR=1
              break
            fi
            CURSOR="$NEXT_CURSOR"
          done
          if [ "$GQL_ERROR" -eq 1 ]; then
            echo "GATE-5 FAIL: GraphQL error or pagination truncated"
            ELIGIBLE=false
          elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
            echo "GATE-5 FAIL: $UNRESOLVED unresolved comments"
            ELIGIBLE=false
          else
            echo "GATE-5 PASS: all comments resolved"
          fi
          fi # end: PR_AUTHOR guard else-block

          # Gate 6: Evidence — check for evidence links in PR body or comments.
          PR_BODY=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.body // ""' 2>/dev/null || echo "")
          PR_COMMENTS_BODY=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
            --paginate 2>/dev/null | jq -r '.[].body' 2>/dev/null || echo "")
          EVID_SCRATCH=$(mktemp)
          printf '%s\n%s\n' "$PR_BODY" "$PR_COMMENTS_BODY" > "$EVID_SCRATCH"
          HAS_EVIDENCE=false
          if grep -Ei 'https?://[^ ]*\.(mp4|gif|cast)|gist\.github\.com/|asciinema\.org/a/|loom\.com/share/|user-attachments\.githubusercontent\.com/' "$EVID_SCRATCH" > /dev/null; then
            HAS_EVIDENCE=true
          fi
          rm -f "$EVID_SCRATCH"
          CHANGED_FILES=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/files \
            --paginate 2>/dev/null | jq -r '.[].filename' 2>/dev/null || echo "")
          EVIDENCE_REQUIRED=false
          if echo "$CHANGED_FILES" | grep -qE '^(testing_(mcp|ui)/|mvp_site/|deploy\.sh$|\.github/workflows/evidence-gate\.yml$)'; then
            EVIDENCE_REQUIRED=true
          fi
          if [ "$EVIDENCE_REQUIRED" = "true" ] && [ "$HAS_EVIDENCE" = "true" ]; then
            echo "GATE-6 PASS: evidence present"
          elif [ "$EVIDENCE_REQUIRED" = "true" ] && [ "$HAS_EVIDENCE" = "false" ]; then
            echo "GATE-6 FAIL: evidence required but no evidence link found"
            ELIGIBLE=false
          else
            echo "GATE-6 PASS: evidence not required for this change set"
          fi

          echo "7-green eligibility: $ELIGIBLE"
          echo "eligible=$ELIGIBLE" >> "$GITHUB_OUTPUT"

          if [ "$ELIGIBLE" != "true" ]; then
            echo "FAIL: PR #$PR_NUM does not meet 7-green eligibility"
            exit 1
          fi

      # ----------------------------------------------------------------
      # Gate 8: Smoke Gate — mcp-smoke-tests must have passed for this SHA.
      # Required when mvp_site/prompts/ or mvp_site/*.py files changed.
      # Auto-passes (SKIPPED) when no relevant files changed.
      # ----------------------------------------------------------------
      - name: Check smoke gate (gate 8)
        id: check_smoke
        if: steps.check_6green.outputs.eligible == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ steps.check_6green.outputs.head_sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
        run: |
          PR_NUM=$PR_NUM
          EVENT_NAME="${GITHUB_EVENT_NAME:-pull_request}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # On workflow_dispatch the env-provided HEAD_BRANCH may be stale.
            HEAD_BRANCH=""
          fi
          if [ -z "$HEAD_BRANCH" ]; then
            PR_HEAD_BRANCH=""
            if [ -n "$PR_NUM" ]; then
              PR_HEAD_BRANCH=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
                --jq '.head.ref' 2>/dev/null || echo "")
            fi
            if [ -n "$PR_HEAD_BRANCH" ]; then
              HEAD_BRANCH="$PR_HEAD_BRANCH"
            fi
          fi

          if [ -z "$HEAD_BRANCH" ]; then
            echo "WARN: could not resolve PR head branch; fallback smoke filtering to comments and exact-SHA run matches"
          fi

          # Determine if smoke is required based on changed files
          set +e
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/files \
            --paginate 2>/dev/null | jq -r '.[].filename' 2>/dev/null)
          GH_EXIT=$?
          set -e
          if [ $GH_EXIT -ne 0 ] || [ -z "$CHANGED" ]; then
            echo "GATE-8 FAIL: could not fetch PR files (exit=$GH_EXIT) — failing closed"
            echo "smoke_gate=FAIL" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          SMOKE_REQUIRED=false
          if echo "$CHANGED" | grep -qE '^mvp_site/prompts/|^mvp_site/.+\.py$'; then
            SMOKE_REQUIRED=true
          fi

          if [ "$SMOKE_REQUIRED" = "false" ]; then
            echo "GATE-8 PASS: no mvp_site/prompts/ or mvp_site/*.py changes — smoke skipped"
            echo "smoke_gate=PASS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "GATE-8: mvp_site changes detected — checking mcp-smoke-tests status"

          # issue_comment-triggered /smoke workflows record the default-branch SHA
          # in workflow run metadata even though they checkout and test the PR head.
          # Prefer an exact run headSha match, but also accept the smoke report
          # comment whose generated body records the tested PR commit SHA.
          HEAD_PUSHED_AT=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA" \
            --jq '.commit.committer.date // .commit.author.date' 2>/dev/null || echo "")
          SMOKE_POLL=0
          SMOKE_POLL_MAX=45
          while [ "$SMOKE_POLL" -lt "$SMOKE_POLL_MAX" ]; do
            ALL_SMOKE=$(gh run list --workflow mcp-smoke-tests.yml \
              --repo ${{ github.repository }} \
              -L 100 --json databaseId,headSha,status,conclusion,createdAt,event,headBranch,url \
              2>/dev/null || echo "[]")
            SMOKE_RUNS=$(echo "$ALL_SMOKE" | jq --arg sha "$HEAD_SHA" --arg since "$HEAD_PUSHED_AT" --arg branch "$HEAD_BRANCH" '
              . as $all |
              if ($all | map(select(.headSha == $sha)) | length) > 0
              then $all | map(select(.headSha == $sha))
              else if $since != "" then $all | map(select((.createdAt // "") >= $since and .headBranch == $branch)) else [] end
              end
            ' 2>/dev/null || echo "[]")
            EXACT_SHA_MATCH=$(echo "$ALL_SMOKE" | jq --arg sha "$HEAD_SHA" 'any(.[]?; .headSha == $sha)' 2>/dev/null || echo "false")
            SMOKE_COMMENT_BODY=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
              --paginate 2>/dev/null \
              | jq -sr --arg sha "$HEAD_SHA" '
                add
                | map(select(
                    (.body | test("MCP Smoke Tests"; "i"))
                    and (.body | test("\\*\\*Commit SHA\\*\\*:[[:space:]]*`" + $sha + "`"; "i"))
                  ))
                | (map(select(.body | test("MCP Smoke Tests Passed"; "i"))) | first.body) // (sort_by(.updated_at // .created_at // "") | last.body // "")
              ' 2>/dev/null || echo "")

            if echo "$SMOKE_COMMENT_BODY" | grep -qi "MCP Smoke Tests Passed"; then
              echo "GATE-8 PASS: /smoke comment reports success for SHA ${HEAD_SHA:0:7}"
              echo "smoke_gate=PASS" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$EXACT_SHA_MATCH" = "true" ] && echo "$SMOKE_RUNS" | jq -e 'any(.[]; .conclusion == "success")' > /dev/null; then
              SMOKE_RUN_ID=$(echo "$SMOKE_RUNS" | jq -r '[.[] | select(.conclusion == "success")] | sort_by(.databaseId) | last | .databaseId')
              echo "GATE-8 PASS: mcp-smoke-tests succeeded (run $SMOKE_RUN_ID)"
              echo "smoke_gate=PASS" >> "$GITHUB_OUTPUT"
              exit 0
            elif echo "$SMOKE_RUNS" | jq -e 'any(.[]; .status == "in_progress" or .status == "queued")' > /dev/null; then
              # Detect active retries BEFORE checking the Failed comment so an
              # older failure comment cannot short-circuit a fresh smoke run.
              SMOKE_RUN_ID=$(echo "$SMOKE_RUNS" | jq -r '[.[] | select(.status == "in_progress" or .status == "queued")] | sort_by(.databaseId) | last | .databaseId')
              SMOKE_POLL=$((SMOKE_POLL + 1))
              echo "GATE-8 WAIT: mcp-smoke-tests still running (run $SMOKE_RUN_ID; poll $SMOKE_POLL/$SMOKE_POLL_MAX)"
              sleep 20
            elif echo "$SMOKE_COMMENT_BODY" | grep -qi "MCP Smoke Tests Failed"; then
              echo "GATE-8 FAIL: /smoke comment reports failure for SHA ${HEAD_SHA:0:7}"
              echo "smoke_gate=FAIL" >> "$GITHUB_OUTPUT"
              exit 1
            elif [ "$(echo "$SMOKE_RUNS" | jq 'length')" -eq 0 ]; then
              SMOKE_POLL=$((SMOKE_POLL + 1))
              echo "GATE-8 WAIT: no mcp-smoke-tests run or /smoke result found for SHA ${HEAD_SHA:0:7} yet (poll $SMOKE_POLL/$SMOKE_POLL_MAX)"
              sleep 20
            elif [ "$EXACT_SHA_MATCH" = "true" ]; then
              SMOKE_RUN_ID=$(echo "$SMOKE_RUNS" | jq -r 'sort_by(.databaseId) | last | .databaseId')
              SMOKE_CONCLUSION=$(echo "$SMOKE_RUNS" | jq -r 'sort_by(.databaseId) | last | .conclusion // "none"')
              echo "GATE-8 FAIL: mcp-smoke-tests conclusion=$SMOKE_CONCLUSION (run $SMOKE_RUN_ID)"
              echo "smoke_gate=FAIL" >> "$GITHUB_OUTPUT"
              exit 1
            else
              # Branch/createdAt fallback match only — conclusions are not
              # authoritative for the current HEAD SHA, keep polling for an
              # exact-SHA run or a smoke comment tied to HEAD_SHA.
              SMOKE_POLL=$((SMOKE_POLL + 1))
              echo "GATE-8 WAIT: no exact-SHA smoke match for ${HEAD_SHA:0:7} yet (fallback match present; poll $SMOKE_POLL/$SMOKE_POLL_MAX)"
              sleep 20
            fi
          done

          echo "GATE-8 FAIL: timed out waiting for mcp-smoke-tests for SHA ${HEAD_SHA:0:7}"
          echo "smoke_gate=FAIL" >> "$GITHUB_OUTPUT"
          exit 1

      # ----------------------------------------------------------------
      # Step 2: Post trigger comment and capture GitHub server timestamp.
      # Lifecycle-manager picks up this comment and dispatches AO worker
      # to run ao skeptic verify (Codex OAuth, no GHA API keys needed).
      # ----------------------------------------------------------------
      - name: Post gate trigger comment
        id: post_trigger
        if: steps.check_6green.outputs.eligible == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ steps.check_6green.outputs.head_sha }}
        run: |
          PR_NUM=$PR_NUM
          TRIGGER_SHA="$HEAD_SHA"
          BODY=$(printf '%s\n%s' \
            "SKEPTIC_GATE_TRIGGER" \
            "<!-- skeptic-gate-trigger-${TRIGGER_SHA} -->")

          # POST create comment — retry on installation REST rate limits (HTTP 403).
          TRIGGER_UPDATED=""
          for _attempt in 1 2 3 4 5; do
            set +e
            TRIGGER_UPDATED=$(gh api -X POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUM}/comments" \
              -H "Accept: application/vnd.github+json" \
              -f "body=${BODY}" \
              --jq '.updated_at' 2>/dev/null)
            _rc=$?
            set -e
            if [ "$_rc" -eq 0 ] && [ -n "$TRIGGER_UPDATED" ] && [ "$TRIGGER_UPDATED" != "null" ]; then
              break
            fi
            echo "::warning::POST trigger comment failed (rc=${_rc}), attempt ${_attempt}/5 — sleeping 60s (rate limit backoff)"
            sleep 60
          done
          if [ -z "$TRIGGER_UPDATED" ] || [ "$TRIGGER_UPDATED" = "null" ]; then
            echo "ERROR: failed to post trigger comment after retries (check GitHub API rate limits)" >&2
            exit 1
          fi
          echo "Trigger timestamp (GitHub server): $TRIGGER_UPDATED"
          echo "trigger_updated=$TRIGGER_UPDATED" >> "$GITHUB_OUTPUT"
          echo "trigger_sha=$TRIGGER_SHA" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Step 3: Poll for the asynchronous VERDICT.
      # The trigger comment above is consumed out-of-band; keep the check pending
      # while the bot posts its VERDICT instead of permanently failing first run.
      # If VERDICT: PASS → pass. If VERDICT: FAIL/WAIT → fail closed.
      # ----------------------------------------------------------------
      - name: Poll for VERDICT
        if: steps.check_6green.outputs.eligible == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ steps.check_6green.outputs.head_sha }}
          SKEPTIC_BOT_AUTHOR: ${{ vars.SKEPTIC_BOT_AUTHOR || 'github-actions[bot]' }}
        run: |
          PR_NUM=$PR_NUM

          echo "Checking for existing VERDICT on PR #$PR_NUM (commit ${HEAD_SHA:0:7})"

          PR_STATE=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.state' 2>/dev/null || echo "error")
          if [ "$PR_STATE" = "closed" ]; then
            echo "PR is closed — skipping (will not block merge)"
            echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERDICT_JSON=""
          VERDICT_POLL=0
          VERDICT_POLL_MAX=30
          while [ "$VERDICT_POLL" -lt "$VERDICT_POLL_MAX" ]; do
            set +e
            VERDICT_JSON=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
              --paginate 2>/dev/null \
              | jq -s --arg author "$SKEPTIC_BOT_AUTHOR" --arg ts "$HEAD_SHA" \
              'add
              | map(select(
                  ((.user.login == $author) or (.user.login == "github-actions[bot]"))
                  and (.body | test("VERDICT:"; "i"))
                  and (.body | test("skeptic-(gate|cron)-trigger-" + $ts; "i"))
                ))
              | last // empty' 2>/dev/null)
            LOOKUP_RC=$?
            set -e

            if [ "$LOOKUP_RC" -ne 0 ]; then
              echo "ERROR: verdict lookup failed (gh api or jq error rc=$LOOKUP_RC) — failing closed"
              echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            if echo "$VERDICT_JSON" | jq -e 'if . == null or (.body == null) then empty else .body end | length > 0' > /dev/null 2>&1; then
              break
            fi

            VERDICT_POLL=$((VERDICT_POLL + 1))
            if [ "$VERDICT_POLL" -ge "$VERDICT_POLL_MAX" ]; then
              break
            fi
            echo "No VERDICT found for this SHA yet — waiting for async Gate 7 verdict (poll $VERDICT_POLL/$VERDICT_POLL_MAX)"
            sleep 60
          done

          if ! echo "$VERDICT_JSON" | jq -e 'if . == null or (.body == null) then empty else .body end | length > 0' > /dev/null 2>&1; then
            echo "No VERDICT found for this SHA after polling — failing closed until Gate 7 posts a verdict"
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          VERDICT_BODY=$(echo "$VERDICT_JSON" | jq -r '.body')
          VERDICT_CREATED=$(echo "$VERDICT_JSON" | jq -r '.updated_at')
          echo ""
          echo "=== Found VERDICT (posted $VERDICT_CREATED) ==="
          echo "$VERDICT_BODY"

          if echo "$VERDICT_BODY" | grep -qi "VERDICT: PASS"; then
            echo "verdict=PASS" >> "$GITHUB_OUTPUT"
            echo "=== GREEN GATE: PASS ==="
            exit 0
          elif echo "$VERDICT_BODY" | grep -qi "VERDICT: FAIL"; then
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
            echo "=== GREEN GATE: FAIL ==="
            exit 1
          elif echo "$VERDICT_BODY" | grep -qi "VERDICT: SKIPPED"; then
            echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
            echo "=== GREEN GATE: SKIPPED ==="
            exit 0
          elif echo "$VERDICT_BODY" | grep -qi "VERDICT: WAIT"; then
            echo "verdict=WAIT" >> "$GITHUB_OUTPUT"
            echo "=== GREEN GATE: WAIT (smoke in progress) ==="
            exit 1
          else
            echo "WARNING: VERDICT body contains 'VERDICT:' but none of PASS/FAIL/SKIPPED/WAIT"
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
            exit 1
          fi
