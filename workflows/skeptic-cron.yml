name: Skeptic Cron

# Master logic managed by jleechanorg/agent-orchestrator.
# Uses @main to auto-track fixes (jq $ anchor fix, evidence gate, etc.)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches-ignore:
      - "**"

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: read
  checks: read

jobs:
  skeptic_cron:
    uses: jleechanorg/agent-orchestrator/.github/workflows/skeptic-cron-reusable.yml@main
    with:
      # Default: use self-hosted 'mikey' runner for cron/eval.
      runner_labels: ${{ vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]' }}
      auto_merge: "false"
    secrets: inherit
