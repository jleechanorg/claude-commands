name: CodeRabbit ping on push

on:
  push:
    branches-ignore:
      - main
      - master
      - 'release/**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ping-coderabbit:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Comment on matching open PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            // Skip if branch matches ignore patterns (defense in depth)
            if (branch === 'main' || branch === 'master' || branch.startsWith('release/')) {
              core.info(`Branch ${branch} is ignored; skipping.`);
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 10,
            });

            if (!prs.length) {
              core.info(`No open PR for branch ${branch}; skipping.`);
              return;
            }

            const body = '@coderabbitai all good?';
            const cooldownMinutes = 10;
            const tenMinAgo = new Date(Date.now() - cooldownMinutes * 60 * 1000);

            for (const pr of prs) {
              // Skip only if we posted in the last N minutes (allows new ping per push after cooldown)
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: pr.number,
                per_page: 50,
                since: tenMinAgo.toISOString(),
              });

              const recentComment = comments.find(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.trim() === body &&
                new Date(c.created_at) > tenMinAgo
              );

              if (recentComment) {
                core.info(`Skipping PR #${pr.number} - recent ping in last ${cooldownMinutes} min`);
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
              core.info(`Commented on PR #${pr.number}`);
            }
