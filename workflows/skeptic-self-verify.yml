name: Skeptic Self-Verify

# Fallback skeptic agent: runs all gate checks and posts VERDICT as github-actions[bot].
# Use when the AO lifecycle-manager is not available to process trigger comments.
# Triggered manually: gh workflow run skeptic-self-verify.yml --ref <branch> -f pr_number=<N>

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify'
        required: true
        type: string

jobs:
  verify:
    name: Evaluate and post VERDICT
    runs-on: ${{ fromJson(vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","self-hosted-mikey"]') }}
    # gh issue comment on a PR uses GraphQL addComment on the PullRequest; that requires
    # pull-requests:write. issues:write alone yields "Resource not accessible by integration".
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: read
      checks: read
      actions: write
    steps:
      - name: Run gate checks and post VERDICT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUM: ${{ inputs.pr_number }}
          SKEPTIC_BOT_AUTHOR: ${{ vars.SKEPTIC_BOT_AUTHOR || 'github-actions[bot]' }}
        run: |
          set -euo pipefail

          BODY_FILE=""
          cleanup_body_file() { [ -n "$BODY_FILE" ] && rm -f "$BODY_FILE"; }
          trap cleanup_body_file EXIT ERR

          # --- GRAPHQL PRIMARY PATH WITH REST FALLBACK ---
          USE_GRAPHQL=0
          if GH_PR_VIEW=$(gh pr view "$PR_NUM" --json headRefOid,author,mergeable,state,statusCheckRollup,reviews,comments,files,body 2>/dev/null); then
            HEAD_SHA=$(echo "$GH_PR_VIEW" | jq -r '.headRefOid // ""')
            if [ -n "$HEAD_SHA" ]; then
              USE_GRAPHQL=1
            fi
          fi

          if [ "$USE_GRAPHQL" -eq 1 ]; then
            echo "Using GraphQL (gh pr view) for data fetches."
            PR_AUTHOR=$(echo "$GH_PR_VIEW" | jq -r '.author.login // "ghost"')
            PR_STATE=$(echo "$GH_PR_VIEW" | jq -r '.state // "OPEN"')
            MERGEABLE=$(echo "$GH_PR_VIEW" | jq -r 'if .mergeable == "MERGEABLE" then "true" else "unknown" end')
            
            # Gate 1: CI green (evaluate classic commit statuses only)
            CI_FAIL=$(echo "$GH_PR_VIEW" | jq '[.statusCheckRollup[] | select(.__typename == "StatusContext") | select(.state == "FAILURE" or .state == "ERROR")] | length')
            CI_PEND=$(echo "$GH_PR_VIEW" | jq '[.statusCheckRollup[] | select(.__typename == "StatusContext") | select(.state == "PENDING" or .state == "EXPECTED")] | length')
            if [ "$CI_FAIL" -gt 0 ]; then CI_STATUS="failure"; elif [ "$CI_PEND" -gt 0 ]; then CI_STATUS="pending"; else CI_STATUS="success"; fi
            
            # Gate 3: CodeRabbit APPROVED
            LATEST_CR_ON_HEAD=$(echo "$GH_PR_VIEW" | jq -r --arg head "$HEAD_SHA" '
              [.reviews[] | select((.author.login == "coderabbitai" or .author.login == "coderabbitai[bot]") and .state != "COMMENTED" and .commitId == $head)] | sort_by(.submittedAt) | last | .state // "none"
            ')
            CR_APPROVE_COMMENT=$(echo "$GH_PR_VIEW" | jq -r '
              [.comments[] | select((.author.login == "coderabbitai" or .author.login == "coderabbitai[bot]") and ((.body // "") | test("\\[approve\\]"; "i")))] | last | if . then "APPROVED" else "none" end
            ')
            CR_STATUS=$(echo "$GH_PR_VIEW" | jq -r '
              [.statusCheckRollup[] | select(.context == "CodeRabbit" or .name == "CodeRabbit")] | last | .state // "none"
            ')
            
            # Gate 4: Cursor Bugbot (Action CheckRun)
            BUGBOT=$(echo "$GH_PR_VIEW" | jq -r '
              [.statusCheckRollup[] | select((.name // "") | test("Cursor Bugbot"; "i"))] | last | .conclusion // "none"
            ')
            
            # Gate 6: Evidence. The PR body is the canonical design/evidence
            # source for skeptic review; generated PR design-doc artifacts are
            # intentionally not required.
            PR_BODY=$(echo "$GH_PR_VIEW" | jq -r '.body // ""')
            # GitHub GraphQL .comments[] is limited to ~30; use REST --paginate to fetch all
            PR_COMMENTS_REST=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUM/comments" --paginate 2>/dev/null | jq -r '.[].body' 2>/dev/null || echo "")
            PR_COMMENTS="${PR_COMMENTS_REST:-$(echo "$GH_PR_VIEW" | jq -r '[.comments[].body] | join("\n")' 2>/dev/null)}"
            CHANGED=$(echo "$GH_PR_VIEW" | jq -r '[.files[].path] | join("\n")' 2>/dev/null || echo "")
            
          else
            echo "GraphQL fetch failed. Falling back to REST API..."
            # Fetch PR details
            PR_DATA=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUM"               --jq '{sha: .head.sha, author: (.user.login // "ghost"), mergeable: .mergeable, state: .state}'               2>/dev/null || echo '{}')
            HEAD_SHA=$(echo "$PR_DATA" | jq -r '.sha // ""')
            PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.author // "ghost"')
            PR_STATE=$(echo "$PR_DATA" | jq -r '.state // "open"')
            MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable // "unknown"')
            
            CI_STATUS=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/status"               --jq '.state' 2>/dev/null || echo "error")
              
            LATEST_CR_ON_HEAD=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUM/reviews"               --paginate 2>/dev/null               | jq -rs --arg head "$HEAD_SHA"                 'add | [.[] | select((.user.login == "coderabbitai[bot]" or .user.login == "coderabbitai") and .state != "COMMENTED" and .commit_id == $head)] | sort_by(.submitted_at) | last | .state // "none"'               2>/dev/null || echo "none")
            
            HEAD_COMMITTED_AT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA"               --jq '.commit.committer.date // ""' 2>/dev/null || echo "")
            CR_STATUS=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/status"               --jq '.statuses | map(select(.context == "CodeRabbit")) | sort_by(.updated_at) | last | .state // "none"'               2>/dev/null || echo "none")
            CR_APPROVE_COMMENT="none"
            if [ -n "$HEAD_COMMITTED_AT" ]; then
              CR_APPROVE_COMMENT=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUM/comments"                 --paginate 2>/dev/null                 | jq -rs --arg since "$HEAD_COMMITTED_AT"                   'add | [.[] | select((.user.login == "coderabbitai[bot]" or .user.login == "coderabbitai") and .created_at >= $since and (.body | test("\\[approve\\]"; "i")))] | sort_by(.created_at) | last | if . then "APPROVED" else "none" end'                 2>/dev/null || echo "none")
            fi
            
            BUGBOT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs"               --paginate 2>/dev/null               | jq -rs '[.[] | .check_runs[]? | select(.name | test("Cursor Bugbot"; "i"))]
                  | if length == 0 then "none"
                    else (sort_by(.completed_at // "") | last | .conclusion // "none")
                    end'               2>/dev/null || echo "error")
              
            PR_BODY=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUM" --jq '.body // ""' 2>/dev/null || echo "")
            PR_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUM/comments" --paginate 2>/dev/null | jq -r '.[].body' 2>/dev/null || echo "")
            CHANGED=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUM/files" --paginate 2>/dev/null | jq -r '.[].filename' 2>/dev/null || echo "")
          fi

          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: could not fetch PR #$PR_NUM head SHA" >&2
            exit 1
          fi
          echo "PR #$PR_NUM  SHA=${HEAD_SHA:0:7}  author=$PR_AUTHOR  state=$PR_STATE"

          # Gate 1: CI green
          if [ "$CI_STATUS" = "success" ]; then G1="PASS"; else G1="FAIL(CI=$CI_STATUS)"; fi
          echo "  [1] CI:            $G1"

          # Gate 2: No merge conflicts
          if [ "$MERGEABLE" = "true" ]; then G2="PASS"; else G2="FAIL(mergeable=$MERGEABLE)"; fi
          echo "  [2] Conflicts:     $G2"

          # Gate 3: CodeRabbit APPROVED
          if [ "$LATEST_CR_ON_HEAD" = "APPROVED" ]; then
            G3="PASS"
          elif [ "$LATEST_CR_ON_HEAD" != "none" ]; then
            G3="FAIL(CR=$LATEST_CR_ON_HEAD)"
          else
            if [ "$CR_STATUS" = "success" ] && [ "$CR_APPROVE_COMMENT" = "APPROVED" ]; then
              G3="PASS(status+comment)"
            elif [ "$CR_STATUS" = "success" ] || [ "$CR_STATUS" = "SUCCESS" ]; then
              G3="PASS(status-only)"
            else
              G3="FAIL(no-review-on-head CR-status=$CR_STATUS comment=$CR_APPROVE_COMMENT)"
            fi
          fi
          echo "  [3] CodeRabbit:    $G3"

          # Gate 4: Cursor Bugbot
          # Note: GraphQL 'conclusion' is UPPERCASE (e.g. SUCCESS), REST is lowercase (success).
          # We use a case-insensitive match for the valid states.
          if echo "$BUGBOT" | grep -qiE "^(success|neutral|skipped|none)$"; then G4="PASS"; else G4="FAIL(bugbot=$BUGBOT)"; fi
          echo "  [4] Bugbot:        $G4"

          # Gate 5: Unresolved review threads (paginated)
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          UNRESOLVED=0
          RT_CURSOR=""
          G5=""
          RT_PAGE=0
          RT_MAX_PAGES=50
          while true; do
            RT_PAGE=$((RT_PAGE + 1))
            if [ "$RT_PAGE" -gt "$RT_MAX_PAGES" ]; then
              G5="FAIL(reviewThreads-pagination-limit)"
              break
            fi
            
            # Use GraphQL for review threads — capture output first, validate JSON (matches green-gate.yml)
            GQL_ERROR=0
            if [ -z "$RT_CURSOR" ]; then
              RT_RESP=$(gh api graphql \
                -f query='query($owner:String!,$name:String!,$pr:Int!){repository(owner:$owner,name:$name){pullRequest(number:$pr){reviewThreads(first:100){pageInfo{hasNextPage endCursor}nodes{isResolved comments(first:50){pageInfo{hasNextPage}nodes{author{login}body}}}}}}}' \
                -f owner="$GITHUB_REPOSITORY_OWNER" \
                -f name="$REPO_NAME" \
                -F pr="$PR_NUM" \
                2>/dev/null || echo "")
            else
              RT_RESP=$(gh api graphql \
                -f query='query($owner:String!,$name:String!,$pr:Int!,$cursor:String!){repository(owner:$owner,name:$name){pullRequest(number:$pr){reviewThreads(first:100,after:$cursor){pageInfo{hasNextPage endCursor}nodes{isResolved comments(first:50){pageInfo{hasNextPage}nodes{author{login}body}}}}}}}' \
                -f owner="$GITHUB_REPOSITORY_OWNER" \
                -f name="$REPO_NAME" \
                -F pr="$PR_NUM" \
                -f cursor="$RT_CURSOR" \
                2>/dev/null || echo "")
            fi
            if [ -z "$RT_RESP" ] || ! echo "$RT_RESP" | jq -e '
              (.errors | not) and
              (.data.repository.pullRequest.reviewThreads.pageInfo != null)
            ' >/dev/null; then
              GQL_ERROR=1
              echo "ReviewThreads GraphQL query returned empty or errored. Response: $(echo "$RT_RESP" | head -c 500)"
              break
            fi
            
            # Count unresolved threads from non-bot, non-author commenters (matches green-gate.yml)
            # Guard: if any thread has >50 comments (hasNextPage on comments), fail closed
            if [ "$(echo "$RT_RESP" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
              G5="FAIL(reviewThreads-comment-pagination-exceeded)"
              break
            fi
            PAGE_UNRESOLVED=$(echo "$RT_RESP" | jq -r \
              --arg author "$PR_AUTHOR" \
              --arg ignore_cursor "cursor" \
              --arg ignore_cursor_bot "cursor[bot]" \
              --arg ignore_codereview "coderabbitai" \
              --arg ignore_codereview_bot "coderabbitai[bot]" \
              --arg ignore_github_actions "github-actions[bot]" \
              --arg ignore_codex_connector "chatgpt-codex-connector" \
              --arg ignore_codex_connector_bot "chatgpt-codex-connector[bot]" \
              '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) |
                 .comments.nodes[] |
                 select(
                   .author.login != null and
                   (.author.login | ascii_downcase) != ($author | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_cursor | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_cursor_bot | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codereview | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codereview_bot | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_github_actions | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codex_connector | ascii_downcase) and
                   (.author.login | ascii_downcase) != ($ignore_codex_connector_bot | ascii_downcase) and
                   (.body | test("^\\s*(nit:|nitpick)"; "i") | not)
                 )] | length' 2>/dev/null || echo 0)
            UNRESOLVED=$((UNRESOLVED + PAGE_UNRESOLVED))
            HAS_NEXT=$(echo "$RT_RESP" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage' 2>/dev/null || echo "false")
            [ "$HAS_NEXT" = "true" ] || break
            NEW_CURSOR=$(echo "$RT_RESP" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor' 2>/dev/null || echo "")
            if [ -z "$NEW_CURSOR" ] || [ "$NEW_CURSOR" = "null" ] || [ "$NEW_CURSOR" = "$RT_CURSOR" ]; then
              G5="FAIL(reviewThreads-pagination-cursor-stuck)"
              break
            fi
            RT_CURSOR="$NEW_CURSOR"
          done
          if [ "$GQL_ERROR" -eq 1 ] && [ -z "$G5" ]; then
            G5="FAIL(reviewThreads-gql-error)"
          elif [ -z "$G5" ]; then
            if [ "$UNRESOLVED" = "0" ]; then G5="PASS"; else G5="FAIL($UNRESOLVED unresolved)"; fi
          fi
          echo "  [5] Comments:      $G5"

          # Gate 6: Evidence (video/recording in PR body or comments).
          # Avoid echo|grep under pipefail: grep exits on first match and SIGPIPE breaks the pipe.
          EVID_SCRATCH=$(mktemp)
          printf '%s\n%s\n' "$PR_BODY" "$PR_COMMENTS" > "$EVID_SCRATCH"
          HAS_EVIDENCE=false
          if grep -Ei 'https?://[^ ]*\.(mp4|gif|cast)|gist\.github\.com/|asciinema\.org/a/|loom\.com/share/|user-attachments\.githubusercontent\.com/' "$EVID_SCRATCH" > /dev/null; then
            HAS_EVIDENCE=true
          fi
          rm -f "$EVID_SCRATCH"
          EVIDENCE_REQUIRED=$(echo "$CHANGED" | grep -E '^(testing_(mcp|ui)/|mvp_site/|deploy\.sh$|\.github/workflows/evidence-gate\.yml$)' > /dev/null && echo "true" || echo "false")
          if [ "$EVIDENCE_REQUIRED" = "false" ]; then
            G6="PASS(evidence-not-required)"
          else
            if [ "$HAS_EVIDENCE" = "true" ]; then G6="PASS"; else G6="FAIL(no-evidence)"; fi
          fi
          echo "  [6] Evidence:      $G6"

          # Gates 7 and 8: this workflow IS the skeptic evaluation
          G7="PASS"
          echo "  [7] Self-verify:   $G7"

          # Gate 8: Smoke Gate — mcp-smoke-tests must pass when mvp_site/ changed
          SMOKE_REQUIRED=false
          if echo "$CHANGED" | grep -qE '^mvp_site/prompts/|^mvp_site/.+\.py$'; then
            SMOKE_REQUIRED=true
          fi

          if [ "$SMOKE_REQUIRED" = "false" ]; then
            G8="PASS(skipped-no-mvp-site-changes)"
          else
            # issue_comment-triggered workflows record the default-branch SHA as headSha,
            # not the PR head SHA. Fetch recent workflow runs and smoke result comments:
            #   1. Prefer runs whose headSha matches (workflow_dispatch / pull_request triggers)
            #   2. Accept /smoke report comments that record this PR head SHA
            #   3. Fall back to recent run status for WAIT/FAIL observability
            HEAD_PUSHED_AT=$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA" \
              --jq '.commit.committer.date // .commit.author.date' 2>/dev/null || echo "")
            ALL_SMOKE=$(gh run list --workflow mcp-smoke-tests.yml \
              --repo "$GITHUB_REPOSITORY" \
              -L 100 --json databaseId,headSha,status,conclusion,createdAt,event,headBranch,url \
              2>/dev/null || echo "[]")
            SMOKE_RUNS=$(echo "$ALL_SMOKE" | jq --arg sha "$HEAD_SHA" --arg since "$HEAD_PUSHED_AT" --arg branch "$GITHUB_REF_NAME" '
              . as $all |
              if ($all | map(select(.headSha == $sha)) | length) > 0
              then $all | map(select(.headSha == $sha))
              else if $since != "" then $all | map(select((.createdAt // "") >= $since and .headBranch == $branch)) else [] end
              end
            ' 2>/dev/null || echo "[]")
            SMOKE_COMMENT_BODY=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUM/comments" \
              --paginate 2>/dev/null \
              | jq -sr --arg sha "$HEAD_SHA" '
                add
                | map(select(
                    (.body | test("MCP Smoke Tests"; "i"))
                    and (.body | test("\\*\\*Commit SHA\\*\\*:[[:space:]]*`" + $sha + "`"; "i"))
                  ))
                | sort_by(.updated_at // .created_at // "")
                | last.body // ""
              ' 2>/dev/null || echo "")
            if echo "$SMOKE_COMMENT_BODY" | grep -qi "MCP Smoke Tests Passed"; then
              G8="PASS"
            elif echo "$SMOKE_RUNS" | jq -e 'any(.[]; .conclusion == "success")' > /dev/null; then
              G8="PASS"
            elif echo "$SMOKE_RUNS" | jq -e 'any(.[]; .status == "in_progress" or .status == "queued")' > /dev/null; then
              G8="WAIT(smoke-still-running)"
            elif echo "$SMOKE_COMMENT_BODY" | grep -qi "MCP Smoke Tests Failed"; then
              G8="FAIL(smoke-comment-failed-for-SHA)"
            elif [ "$(echo "$SMOKE_RUNS" | jq 'length')" -eq 0 ]; then
              G8="FAIL(no-smoke-run-for-SHA)"
            else
              G8="FAIL(smoke-no-success-for-SHA)"
            fi
          fi
          echo "  [8] Smoke:         $G8"

          # Determine overall verdict
          ALL_PASS=true
          HAS_WAIT=false
          for G in "$G1" "$G2" "$G3" "$G4" "$G5" "$G6" "$G8"; do
            echo "$G" | grep -q "^FAIL" && ALL_PASS=false && break
            echo "$G" | grep -q "^WAIT" && HAS_WAIT=true
          done
          if [ "$ALL_PASS" = "true" ] && [ "$HAS_WAIT" = "false" ]; then
            VERDICT="PASS"
          elif [ "$ALL_PASS" = "true" ] && [ "$HAS_WAIT" = "true" ]; then
            VERDICT="WAIT"
          else
            VERDICT="FAIL"
          fi
          echo ""
          echo "VERDICT: $VERDICT"

          # Find existing trigger comment REQUEST_ID
          COMMENTS_RAW=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUM/comments" \
            --paginate 2>/dev/null || echo "[]")
          REQUEST_ID=$(echo "$COMMENTS_RAW" | jq -sr \
            --arg sha "$HEAD_SHA" \
            --arg author "$SKEPTIC_BOT_AUTHOR" \
            'add
            | map(. + {request_id: (try (.body | capture("<!--\\s*skeptic-request-id-(?<request_id>[A-Za-z0-9_.:-]+)\\s*-->"; "i").request_id) catch "")})
            | map(select(
                ((.user.login == $author) or (.user.login == "github-actions[bot]"))
                and (.body | test("SKEPTIC_(CRON|GATE)_TRIGGER"; "i"))
                and (.body | test("<!--\\s*skeptic-(cron|gate)-trigger-" + $sha; "i"))
                and (.request_id != "")
              ))
            | sort_by(.created_at // .updated_at // "")
            | last.request_id // ""' 2>/dev/null || echo "")
          if [ -z "$REQUEST_ID" ]; then
            REQUEST_ID="self-verify-${GITHUB_RUN_ID}-${PR_NUM}-${HEAD_SHA:0:12}"
          fi
          echo "Using REQUEST_ID: $REQUEST_ID"

          # Gate marker values (PASS or FAIL based on gate result)
          M1=$(echo "$G1" | grep -q "^FAIL" && echo "FAIL" || echo "PASS")
          M2=$(echo "$G2" | grep -q "^FAIL" && echo "FAIL" || echo "PASS")
          M3=$(echo "$G3" | grep -q "^FAIL" && echo "FAIL" || echo "PASS")
          M4=$(echo "$G4" | grep -q "^FAIL" && echo "FAIL" || echo "PASS")
          M5=$(echo "$G5" | grep -q "^FAIL" && echo "FAIL" || echo "PASS")
          M6=$(echo "$G6" | grep -q "^FAIL" && echo "FAIL" || echo "PASS")
          if echo "$G8" | grep -q "^FAIL"; then M8="FAIL"
          elif echo "$G8" | grep -q "^WAIT"; then M8="WAIT"
          else M8="PASS"; fi

          # Build VERDICT comment body (use a temp file for multiline safety)
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" << EOF
          VERDICT: ${VERDICT}

          Automated self-verification (skeptic-self-verify.yml) — all gates evaluated by github-actions[bot].

          | Gate | Check | Result |
          |------|-------|--------|
          | 1 | CI passing | ${G1} |
          | 2 | No merge conflicts | ${G2} |
          | 3 | CodeRabbit APPROVED | ${G3} |
          | 4 | Cursor Bugbot | ${G4} |
          | 5 | Inline comments resolved | ${G5} |
          | 6 | Evidence | ${G6} |
          | 7 | Self-verify | PASS |
          | 8 | Smoke Gate | ${G8} |

          SKEPTIC_CRON_TRIGGER

          <!-- skeptic-agent-verdict -->
          <!-- skeptic-head-sha-${HEAD_SHA} -->
          <!-- skeptic-cron-trigger-${HEAD_SHA} -->
          <!-- skeptic-request-id-${REQUEST_ID} -->
          <!-- skeptic-gate-1: ${M1} -->
          <!-- skeptic-gate-2: ${M2} -->
          <!-- skeptic-gate-3: ${M3} -->
          <!-- skeptic-gate-4: ${M4} -->
          <!-- skeptic-gate-5: ${M5} -->
          <!-- skeptic-gate-6: ${M6} -->
          <!-- skeptic-gate-7: PASS -->
          <!-- skeptic-gate-8: ${M8} -->
          EOF

          if gh issue comment "$PR_NUM" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file "$BODY_FILE" 2>&1; then
            echo "Posted VERDICT: $VERDICT for PR #$PR_NUM (SHA ${HEAD_SHA:0:7})"
          else
            echo "ERROR: failed to post VERDICT comment" >&2
            exit 1
          fi

          # Dispatch Green Gate so the branch protection check reflects this VERDICT.
          # On pull_request events, Green Gate exits 1 immediately (no VERDICT yet).
          # After Skeptic posts VERDICT: PASS, dispatching Green Gate lets it re-check
          # and satisfy the branch protection requirement without a manual rerun.
          if [ "$VERDICT" = "PASS" ]; then
            BRANCH=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
            if [ -n "$BRANCH" ]; then
              echo "Dispatching Green Gate for $BRANCH (PR #$PR_NUM SHA ${HEAD_SHA:0:7})"
              gh workflow run green-gate.yml \
                --repo "$GITHUB_REPOSITORY" \
                --ref "$BRANCH" \
                --field pr_number="$PR_NUM" \
                --field head_sha="$HEAD_SHA" \
                && echo "Green Gate dispatch queued" \
                || echo "WARNING: failed to dispatch green-gate.yml (non-fatal)" >&2
            else
              echo "WARNING: could not resolve branch for PR #$PR_NUM — skipping Green Gate dispatch" >&2
            fi
          fi
