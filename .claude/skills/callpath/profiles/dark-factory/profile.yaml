name: dark-factory
description: Auto-factory pipeline — GH factory issues → beads → overlay → route → dispatch → AO → gates
domain: dark-factory
runner: run.sh
env:
  DARK_FACTORY_HOME: "${DARK_FACTORY_HOME:-$HOME/projects/dark-factory}"
  DAEMON_CXDB: "${DAEMON_CXDB:-$HOME/.dark-factory/daemon-cxdb.sqlite}"
args:
  - name: prs
    flag: --prs
    help: Comma-separated PR numbers for gate appendix
  - name: issue
    flag: --issue
    help: GH issue number(s) for per-issue pipeline trace (repeatable)
